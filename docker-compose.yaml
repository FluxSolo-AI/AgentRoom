version: '3.8'

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    command: ["-js"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: fluxroom
      POSTGRES_USER: fluxroom
      POSTGRES_PASSWORD: fluxroom_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxroom"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NATS_URL=nats://nats:4222
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Web UI
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_WS_URL=ws://localhost:8080
    depends_on:
      - api

  # WebSocket Server
  ws-server:
    build:
      context: .
      dockerfile: packages/web/Dockerfile.ws
    ports:
      - "8080:8080"
    environment:
      - WS_PORT=8080
      - NATS_URL=nats://nats:4222
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      nats:
        condition: service_healthy

volumes:
  nats_data:
  postgres_data:
  redis_data:
